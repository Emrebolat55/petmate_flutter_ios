name: petmate_flutter
description: PetMate - Evcil Hayvan Platformu
publish_to: 'none'

version: 1.0.0+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.0
  firebase_database: ^10.5.0
  firebase_storage: ^11.7.0
  image_picker: ^1.0.4
  google_maps_flutter: ^2.18.0
  geolocator: ^14.0.2
  http: ^1.1.0
  url_launcher: ^6.1.14
  geocoding: ^2.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.1
  # FLUTTER 3.x İÇİN UYUMLU ÖDEME SİSTEMİ
  # in_app_purchase kaldırıldı (RevenueCat kullanılıyor)
  google_mobile_ads: ^6.0.0
  purchases_ui_flutter: ^9.14.0
  purchases_flutter: ^9.14.0
  

  # Alternatif: RevenueCat (Daha Kolay)
  # purchases_flutter: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/petlogo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/petlogo.png"
  adaptive_icon_background: "#1A237E"  # Arka plan rengi (isteğe bağlı)
  adaptive_icon_foreground: "assets/images/petlogo.png"