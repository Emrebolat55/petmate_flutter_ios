workflows:
  ios-app-store:
    name: Petmate iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - apple_auth # App Store Connect API Key group
      vars:
        XCODE_SCHEME: "Runner"
        XCODE_PROJECT: "ios/Runner.xcodeproj"
        BUNDLE_ID: "com.bolatsoft.petmate"
        APP_STORE_APPLE_ID: 6742548485
        COCOAPODS_SKIP_SHALLOW_FETCH: "true"
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          # Git fixes for detached HEAD and large clones
          git config --global advice.detachedHead false
          git config --global core.compression 0
          git config --global http.postBuffer 524288000
          
          flutter clean
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          flutter packages pub get
          flutter precache --ios
          # Clear cache before build to ensure fresh specs
          pod cache clean --all
      - name: Build Flutter iOS (no codesign)
        script: |
          # Use a higher timeout for pod install during build
          flutter build ios --release --no-codesign --verbose
      - name: Build IPA and Sign
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - manual-testers
