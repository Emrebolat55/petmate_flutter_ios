workflows:
  ios-app-store:
    name: Petmate iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest # Reverting to latest as 15.3 is unsupported
      cocoapods: default
      groups:
        - apple_auth # App Store Connect API Key group
      vars:
        XCODE_SCHEME: "Runner"
        XCODE_PROJECT: "ios/Runner.xcodeproj"
        BUNDLE_ID: "com.bolatsoft.petmate"
        APP_STORE_APPLE_ID: 6742548485
        COCOAPODS_SKIP_SHALLOW_FETCH: "true"
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter clean
          # NUCLEAR WIPE: Clear all problematic local caches/repos
          rm -rf ios/Flutter
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          rm -rf ~/.cocoapods
          rm -rf ~/Library/Caches/CocoaPods
          # Remove legacy master spec repo to force CDN usage
          pod repo remove master || true
          # Rebuild project structure
          flutter create .
          flutter packages pub get
          flutter precache --ios
      - name: Build Flutter iOS (no codesign)
        script: |
          # Flutter build command handles pod install internally using our CDN-aware Podfile
          flutter build ios --release --no-codesign
      - name: Build IPA and Sign
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - manual-testers
