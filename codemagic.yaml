workflows:
  ios-app-store:
    name: Petmate iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - apple_auth # App Store Connect API Key group
      vars:
        XCODE_SCHEME: "Runner"
        XCODE_PROJECT: "ios/Runner.xcodeproj"
        BUNDLE_ID: "com.bolatsoft.petmate"
        APP_STORE_APPLE_ID: 6742548485 # Replace with your Apple ID after creating the app
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files --bundle-id "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --all-targets
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install Pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number --bundle-id "$BUNDLE_ID") + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - manual-testers
