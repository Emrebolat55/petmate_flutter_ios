name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up CocoaPods
        run: |
          sudo gem install cocoapods -n /usr/local/bin
          pod --version

      - name: Build Preparation
        run: |
          flutter clean
          # Force regeneration of iOS infrastructure
          flutter create .
          flutter pub get
          flutter precache --ios

      - name: Build iOS No Codesign
        run: |
          git config --global advice.detachedHead false
          # Ensure Cocoapods is clean but healthy
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          # Note: flutter build ios will call pod install automatically
          cd ..
          flutter build ios --release --no-codesign --verbose

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build/ios/iphoneos/*.app
