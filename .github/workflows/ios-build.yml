name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter System Check
        run: |
          flutter doctor -v
          flutter --version

      - name: Get Dependencies (Nuclear Mode)
        run: |
          rm -f pubspec.lock
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Build iOS (Ultra Verbose)
        run: |
          # Use --verbose to find the crash root
          flutter build ios --release --no-codesign --verbose
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build-app
          path: build/ios/iphoneos/*.app
