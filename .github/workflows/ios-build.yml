name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Build iOS No Codesign
        run: |
          # The FLUTTER_ROOT is set by the action. 
          # We use it in our Podfile to find podhelper.rb
          echo "FLUTTER_ROOT is $FLUTTER_ROOT"
          flutter build ios --release --no-codesign --verbose
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build/ios/iphoneos/*.app
